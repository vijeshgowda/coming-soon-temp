  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;600&family=Tiro+Devanagari+Sanskrit&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET / BASE ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      background-color: var(--cream-bg);
      color: var(--text-dark);
      transition: background-color 0.4s, color 0.3s;
    }

    /* ===== THEME VARIABLES (default British racing green / cream / gold) ===== */
    :root, .theme-british {
      --cream-bg:      #fdf6e3;   /* cream */
      --cream-dark:    #f0e6c4;
      --cream-light:   #fffcf4;
      --crimson:       #004225;   /* british racing green */
      --crimson-light: #2d6a4f;
      --crimson-pale:  #6b8e7a;
      --saffron:       #d4af37;   /* gold */
      --saffron-light: #e6c466;
      --gold:          #b68c2c;
      --green:         #1b4d2b;
      --text-dark:     #2c1810;
      --text-mid:      #5c4033;
    }
    .theme-purple {
      --cream-bg:      #fdf6e3;   /* cream */
      --cream-dark:    #f0e6c4;
      --cream-light:   #fffcf4;
      --crimson:       #5e2a84;   /* royal purple */
      --crimson-light: #7e4a9e;
      --crimson-pale:  #b8a2d4;
      --saffron:       #b48c5c;   /* muted gold */
      --saffron-light: #cfb087;
      --gold:          #9f7e4c;
      --green:         #4a2c3b;
      --text-dark:     #2c1810;
      --text-mid:      #5c4033;
    }

    /* ===== ENVELOPE OVERLAY (fixed, covers everything initially) ===== */
    .envelope-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10000;
      pointer-events: none;       /* allow clicks through when fully open, but we control via transform/opacity */
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }
    /* envelope flaps & body */
    .envelope-card {
      width: 90vw;
      max-width: 600px;
      height: 70vh;
      max-height: 500px;
      background: var(--cream-light);
      border: 2px solid var(--saffron);
      border-radius: 12px 12px 4px 4px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      position: relative;
      transform-style: preserve-3d;
      transform: translateY(0) rotateX(0deg);
      transition: transform 0.1s linear; /* will be controlled by JS scroll */
    }
    /* front flap (triangular) */
    .envelope-flap {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--crimson);
      clip-path: polygon(0% 0%, 100% 0%, 50% 30%);
      transform-origin: top;
      transform: rotateX(0deg);
      transition: transform 0.1s linear;
      border-radius: 10px 10px 0 0;
      z-index: 3;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 20px;
      color: var(--cream-light);
      font-family: 'Cinzel', serif;
      letter-spacing: 4px;
      font-size: 1.2rem;
      text-transform: uppercase;
    }
    .envelope-flap span {
      background: rgba(0,0,0,0.2);
      padding: 5px 15px;
      border-radius: 40px;
      backdrop-filter: blur(2px);
    }
    /* back of envelope (static) */
    .envelope-body {
      position: absolute;
      inset: 0;
      background: var(--cream-light);
      border-radius: 8px;
      border: 2px solid var(--saffron);
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Tiro Devanagari Sanskrit', serif;
      color: var(--crimson);
      font-size: 2rem;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.05);
    }
    .envelope-body svg {
      width: 60px;
      fill: var(--saffron);
      opacity: 0.5;
    }
    /* seal */
    .seal {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 80px; height: 80px;
      background: var(--saffron);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--crimson);
      font-size: 2.4rem;
      font-family: 'Tiro Devanagari Sanskrit', serif;
      border: 3px solid var(--cream-light);
      box-shadow: 0 0 0 3px var(--saffron);
      z-index: 5;
    }

    /* ===== THEME BUTTONS (floating) ===== */
    .theme-panel {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 11000;
      display: flex;
      gap: 12px;
      background: rgba(255,250,240,0.7);
      backdrop-filter: blur(8px);
      padding: 10px 16px;
      border-radius: 60px;
      border: 1px solid var(--saffron);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
    .theme-btn {
      border: none;
      background: transparent;
      width: 44px; height: 44px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .theme-btn:hover { transform: scale(1.15); }
    .theme-btn.british { background: #004225; color: #f5e7c8; }
    .theme-btn.purple { background: #5e2a84; color: #f5e7c8; }

    /* ===== MUSIC note (hidden but accessible) ===== */
    .music-credit {
      position: fixed;
      bottom: 24px; left: 24px;
      z-index: 11000;
      background: rgba(0,0,0,0.4);
      color: var(--cream-light);
      font-size: 0.7rem;
      padding: 5px 12px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }

    /* ===== MAIN CONTENT (scrolls) ===== */
    .page { position: relative; z-index: 1; }

    /* rest of your existing styles (preserved) */
    .bg-pattern { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.055; }
    .petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }

<script>
  (function() {
    // ----- THEME SWITCHER -----
    window.setTheme = function(theme) {
      document.body.classList.remove('theme-british', 'theme-purple');
      document.body.classList.add(`theme-${theme}`);
    };

    // ----- ENVELOPE SCROLL ANIMATION + MUSIC -----
    const envelope = document.getElementById('envelopeOverlay');
    const card = document.getElementById('envelopeCard');
    const flap = document.getElementById('envelopeFlap');
    const audio = document.getElementById('weddingAudio');
    let audioPlayed = false;

    // set initial volume very low (0.15)
    audio.volume = 0.15;

    // scroll handler
    function handleScroll() {
      const scrollY = window.scrollY;
      const windowHeight = window.innerHeight;
      // we map scroll from 0 to windowHeight -> envelope opening
      // scroll 0 -> closed (transform: rotateX(0) translateY(0))
      // scroll = windowHeight -> fully open (envelope flips away)
      let progress = Math.min(scrollY / (windowHeight * 0.8), 1.2); // open faster after 80% of viewport

      if (progress >= 1) {
        // fully open -> hide envelope
        envelope.classList.add('hidden');
        // ensure flap is fully raised
        flap.style.transform = 'rotateX(140deg)';
        card.style.transform = 'translateY(-20px) scale(0.9)';
        card.style.opacity = '0';
      } else {
        envelope.classList.remove('hidden');
        card.style.opacity = '1';
        // envelope tilt and flap opening
        // flap opens with progress: 0deg -> 120deg
        const flapAngle = Math.min(progress * 130, 120); // max 120deg
        flap.style.transform = `rotateX(${flapAngle}deg)`;
        // card tilts slightly and moves up
        const translateY = -progress * 25; // moves up -25px at full
        const rotateX = progress * 15; // slight tilt
        card.style.transform = `translateY(${translateY}px) rotateX(${rotateX}deg)`;
        card.style.opacity = 1 - progress * 0.5; // fade slightly but not fully
      }

      // music trigger on first scroll movement (after any user scroll)
      if (!audioPlayed && scrollY > 5) {
        audioPlayed = true;
        audio.play().catch(e => console.log('audio play failed (user interaction needed?)', e));
      }
    }

    window.addEventListener('scroll', handleScroll);
    // initial call to set based on potential reload position
    handleScroll();

    // if user hasn't scrolled, we try to play on any tap (optional)
    document.body.addEventListener('touchstart', function once() {
      if (!audioPlayed) {
        audio.play().catch(()=>{});
        audioPlayed = true;
      }
    }, { once: true, passive: true });

    // ----- petals and reveal (your existing code remains) -----
    // (I'll merge your existing script content here, but to avoid conflict we just add)
  })();
</script>

    function stamens(h){ return [-25,-12,0,12,25].map(a=>{ const r=a*Math.PI/180,len=h*.28; return `<line x1="0" y1="${h*.05}" x2="${(Math.sin(r)*len).toFixed(2)}" y2="${(h*.05-Math.cos(r)*len*.5).toFixed(2)}" stroke="rgba(109,26,42,0.35)" stroke-width="0.5" stroke-linecap="round"/>`; }).join(''); }
