<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lotus Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
:root {
  --lotus-blush: #f8c8dc;
  --lotus-deep: #c85a9e;
  --lotus-shadow: #8a3a72;
  --leaf-sage: #7aa17a;
  --leaf-deep: #3f6b4b;
  --water-mist: #f3f8f7;
  --dawn-gold: #e3b34d;
  --soft-ivory: #fffdf8;
  --text-primary: #3b1f2a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Cormorant Garamond', serif;
  background: radial-gradient(circle at 50% 20%, var(--soft-ivory), var(--water-mist));
  color: var(--text-primary);
  overflow-x: hidden;
  min-height: 100vh;
}

.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
  z-index: 2;
  padding: 2rem;
}

.invite-text {
  font-size: 1.5rem;
  letter-spacing: 3px;
  color: var(--lotus-shadow);
  margin-bottom: 1.5rem;
}

.couple-names {
  font-family: 'Great Vibes', cursive;
  font-size: 4rem;
  color: var(--lotus-deep);
  text-shadow:
    0 0 30px rgba(200,90,158,0.25),
    0 0 60px rgba(200,90,158,0.15);
  margin-bottom: 1.5rem;
}

.details {
  font-size: 1.4rem;
  color: var(--text-primary);
  line-height: 1.8;
}

.gold-line {
  width: 120px;
  height: 2px;
  background: linear-gradient(to right, transparent, var(--dawn-gold), transparent);
  margin: 2rem auto;
}

/* Lotus Animation */

.lotus-field {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}

.lotus-item {
  position: absolute;
  top: -120px;
  opacity: 0;
  animation: lotusFall linear infinite;
  will-change: transform;
}

@keyframes lotusFall {
  0% {
    transform: translateY(0) rotate(0deg) translateX(0);
    opacity: 0;
  }
  10% { opacity: 0.9; }
  50% {
    transform: translateY(50vh) rotate(180deg) translateX(40px);
  }
  100% {
    transform: translateY(120vh) rotate(360deg) translateX(-30px);
    opacity: 0;
  }
}

/* Sound Overlay */

#soundPrompt {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  font-size: 1.6rem;
  cursor: pointer;
  text-align: center;
  padding: 2rem;
}
</style>
</head>

<body>

<!-- SVG Gradients -->
<svg width="0" height="0">
  <defs>
    <radialGradient id="leafGrad">
      <stop offset="0%" stop-color="#7aa17a"/>
      <stop offset="100%" stop-color="#3f6b4b"/>
    </radialGradient>

    <radialGradient id="petalGrad">
      <stop offset="0%" stop-color="#f8c8dc"/>
      <stop offset="100%" stop-color="#c85a9e"/>
    </radialGradient>
  </defs>
</svg>

<div class="lotus-field" id="lotusField"></div>

<section class="hero">
  <div class="invite-text">Together with their families</div>

  <div class="couple-names">
    Aditi <br>&<br> Rohan
  </div>

  <div class="gold-line"></div>

  <div class="details">
    Invite you to celebrate their wedding<br>
    12 December 2026<br>
    4:00 PM<br>
    The Grand Lotus Pavilion
  </div>
</section>

<!-- Sound Prompt -->
<div id="soundPrompt">
  Tap to Enter the Lotus Garden ✨
</div>

<!-- Public Domain Music:
Gymnopédie No.1 by Erik Satie (public domain composition)
Use a hosted public domain mp3 from Musopen or Wikimedia -->
<audio id="bg-music" loop>
  <source src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Satie_-_Gymnop%C3%A9die_No._1.ogg" type="audio/ogg">
</audio>

<script>
const lotusField = document.getElementById("lotusField");

function createLotus() {
  const item = document.createElement("div");
  item.className = "lotus-item";

  const size = Math.random() * 40 + 40;
  const left = Math.random() * 100;
  const duration = Math.random() * 15 + 15;

  item.style.left = left + "vw";
  item.style.animationDuration = duration + "s";
  item.style.width = size + "px";
  item.style.height = size + "px";

  const isPetal = Math.random() > 0.5;

  item.innerHTML = isPetal
    ? `<svg viewBox="0 0 100 100">
         <ellipse cx="50" cy="50" rx="30" ry="50"
           fill="url(#petalGrad)" />
       </svg>`
    : `<svg viewBox="0 0 100 100">
         <circle cx="50" cy="50" r="45"
           fill="url(#leafGrad)" />
       </svg>`;

  lotusField.appendChild(item);

  setTimeout(() => {
    item.remove();
  }, duration * 1000);
}

setInterval(createLotus, 900);

/* Sound Unlock */
const audio = document.getElementById("bg-music");
const prompt = document.getElementById("soundPrompt");

prompt.addEventListener("click", () => {
  audio.volume = 0.4;
  audio.play();
  prompt.style.display = "none";
});
</script>

</body>
</html>
